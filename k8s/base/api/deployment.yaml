apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: devforge
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: api
          image: acrdevforgecarlos.azurecr.io/devforge-api:v2
          ports:
            - containerPort: 8080
          env:
            - name: VAULT_ADDR
              value: "http://172.21.0.1:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
            - name: REDIS_ADDR
              value: "redis:6379"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
