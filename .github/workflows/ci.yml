name: CI/CD DevForge

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        working-directory: ./app
        run: go test ./... -v

  security-sast:
    name: SAST (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./app/...

  build-scan-push:
    name: Build + Trivy + Push
    runs-on: ubuntu-latest
    needs: [test, security-sast]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: ./app
        run: docker build -t caza6367/devforge-api:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: caza6367/devforge-api:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag caza6367/devforge-api:${{ github.sha }} caza6367/devforge-api:latest
          docker push caza6367/devforge-api:${{ github.sha }}
          docker push caza6367/devforge-api:latest
